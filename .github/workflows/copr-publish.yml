name: Publish to COPR

# Manual trigger for ad-hoc COPR publishes.
# Automatic COPR publishing is handled by the copr_publish job in auto-release.yml
# (chained directly after the release job to avoid GITHUB_TOKEN event limitations).
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version without v prefix (e.g. 48.0.0). Leave empty to use version.py."
        required: false

permissions:
  contents: read

concurrency:
  group: copr-publish
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.12"
  COPR_OWNER: "loofitheboss"
  COPR_PROJECT: "loofi-fedora-tweaks"
  COPR_CHROOTS: "fedora-44-x86_64"

jobs:
  publish:
    runs-on: ubuntu-latest
    container: fedora:44
    timeout-minutes: 20
    steps:
      - name: Install dependencies
        run: |
          dnf install -y rpm-build python3 curl copr-cli

      - uses: actions/checkout@v6

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VER="${{ inputs.version }}"
          else
            VER=$(python3 -c "exec(open('loofi-fedora-tweaks/version.py').read()); print(__version__)")
          fi
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VER}"

      - name: Validate spec version matches
        run: |
          SPEC_VER=$(grep '^Version:' loofi-fedora-tweaks.spec | awk '{print $2}')
          CODE_VER="${{ steps.version.outputs.version }}"
          if [ "$SPEC_VER" != "$CODE_VER" ]; then
            echo "::error::Spec version ($SPEC_VER) != code version ($CODE_VER)"
            exit 1
          fi

      - name: Build SRPM
        run: bash scripts/build_srpm.sh

      - name: Configure copr-cli
        run: |
          mkdir -p ~/.config
          cat > ~/.config/copr <<EOF
          [copr-cli]
          copr_url = https://copr.fedorainfracloud.org
          login = ${{ secrets.COPR_LOGIN }}
          username = ${{ secrets.COPR_USERNAME }}
          token = ${{ secrets.COPR_TOKEN }}
          EOF
          chmod 600 ~/.config/copr

      - name: Resolve effective COPR chroots
        run: |
          set -euo pipefail
          PROJECT_JSON=$(curl -fsSL "https://copr.fedorainfracloud.org/api_3/project?ownername=${COPR_OWNER}&projectname=${COPR_PROJECT}")
          AVAILABLE_CHROOTS=$(python3 -c 'import json,sys; d=json.loads(sys.argv[1]); print(" ".join(sorted((d.get("chroot_repos") or {}).keys())))' "$PROJECT_JSON")

          if [ -z "${AVAILABLE_CHROOTS}" ]; then
            echo "::error::No chroots found for COPR project ${COPR_OWNER}/${COPR_PROJECT}"
            exit 1
          fi

          EFFECTIVE_CHROOTS=""
          for chroot in ${COPR_CHROOTS}; do
            for available in ${AVAILABLE_CHROOTS}; do
              if [ "${chroot}" = "${available}" ]; then
                EFFECTIVE_CHROOTS="${EFFECTIVE_CHROOTS} ${chroot}"
              fi
            done
          done

          if [ -z "${EFFECTIVE_CHROOTS}" ]; then
            echo "::warning::Requested chroots '${COPR_CHROOTS}' not configured on ${COPR_OWNER}/${COPR_PROJECT}. Falling back to available chroots: ${AVAILABLE_CHROOTS}"
            EFFECTIVE_CHROOTS="${AVAILABLE_CHROOTS}"
          fi

          EFFECTIVE_CHROOTS=$(echo "${EFFECTIVE_CHROOTS}" | xargs)
          echo "COPR_CHROOTS_EFFECTIVE=${EFFECTIVE_CHROOTS}" >> "$GITHUB_ENV"
          echo "Resolved COPR chroots: ${EFFECTIVE_CHROOTS}"

      - name: Submit build to COPR
        run: |
          SRPM=$(ls rpmbuild/SRPMS/*.src.rpm | head -1)
          echo "Submitting ${SRPM} to COPR project ${COPR_PROJECT}"
          CHROOT_ARGS=""
          for chroot in ${COPR_CHROOTS_EFFECTIVE}; do
            CHROOT_ARGS="${CHROOT_ARGS} --chroot ${chroot}"
          done
          echo "Target chroots:${CHROOT_ARGS}"
          # shellcheck disable=SC2086
          copr-cli build "${COPR_OWNER}/${COPR_PROJECT}" "${SRPM}" --nowait ${CHROOT_ARGS}

      - name: Build summary
        if: always()
        run: |
          VER="${{ steps.version.outputs.version }}"
          echo "::notice::COPR build submitted for loofi-fedora-tweaks v${VER}"
          echo "::notice::Target chroots: ${COPR_CHROOTS_EFFECTIVE:-${COPR_CHROOTS}}"
          echo ""
          echo "Track build status at:"
          echo "  https://copr.fedorainfracloud.org/coprs/${COPR_OWNER}/${COPR_PROJECT}/builds/"
