name: Publish to COPR

# Manual trigger for ad-hoc COPR publishes.
# Automatic COPR publishing is handled by the copr_publish job in auto-release.yml
# (chained directly after the release job to avoid GITHUB_TOKEN event limitations).
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version without v prefix (e.g. 48.0.0). Leave empty to use version.py."
        required: false

permissions:
  contents: read

concurrency:
  group: copr-publish
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.12"
  COPR_OWNER: "loofitheboss"
  COPR_PROJECT: "loofi-fedora-tweaks"
  COPR_PACKAGE: "loofi-fedora-tweaks"
  COPR_CHROOTS: "fedora-43-x86_64"
  SCM_CLONE_URL: "https://github.com/multidraxter-bit/loofi-fedora-tweaks.git"
  SCM_COMMIT: "master"
  SCM_SPEC: "loofi-fedora-tweaks.spec"

jobs:
  publish:
    runs-on: ubuntu-latest
    container: fedora:43
    timeout-minutes: 20
    steps:
      - name: Install dependencies
        run: |
          dnf install -y rpm-build python3 curl copr-cli

      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VER="${{ inputs.version }}"
          else
            VER=$(python3 -c "exec(open('loofi-fedora-tweaks/version.py').read()); print(__version__)")
          fi
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VER}"

      - name: Validate spec version matches
        run: |
          SPEC_VER=$(grep '^Version:' loofi-fedora-tweaks.spec | awk '{print $2}')
          CODE_VER="${{ steps.version.outputs.version }}"
          if [ "$SPEC_VER" != "$CODE_VER" ]; then
            echo "::error::Spec version ($SPEC_VER) != code version ($CODE_VER)"
            exit 1
          fi

      - name: Build SRPM
        run: bash scripts/build_srpm.sh

      - name: Configure copr-cli
        run: |
          mkdir -p ~/.config
          cat > ~/.config/copr <<EOF
          [copr-cli]
          copr_url = https://copr.fedorainfracloud.org
          login = ${{ secrets.COPR_LOGIN }}
          username = ${{ secrets.COPR_USERNAME }}
          token = ${{ secrets.COPR_TOKEN }}
          EOF
          chmod 600 ~/.config/copr

      - name: Check COPR secret presence
        run: |
          missing=0
          for pair in \
            "COPR_LOGIN:${{ secrets.COPR_LOGIN }}" \
            "COPR_USERNAME:${{ secrets.COPR_USERNAME }}" \
            "COPR_TOKEN:${{ secrets.COPR_TOKEN }}"; do
            name="${pair%%:*}"
            value="${pair#*:}"
            if [ -n "$value" ]; then
              echo "::notice::${name}=present"
            else
              echo "::error::${name}=missing"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ]

      - name: Inspect COPR package
        run: |
          PROJECT="${COPR_OWNER}/${COPR_PROJECT}"
          copr-cli --debug get-package "${PROJECT}" "${COPR_PACKAGE}"

      - name: Configure COPR SCM source
        run: |
          PROJECT="${COPR_OWNER}/${COPR_PROJECT}"
          set +e
          copr-cli --debug edit-package-scm "${PROJECT}" \
            --name "${COPR_PACKAGE}" \
            --clone-url "${SCM_CLONE_URL}" \
            --commit "${SCM_COMMIT}" \
            --spec "${SCM_SPEC}"
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "::warning::edit-package-scm failed; trying add-package-scm"
            copr-cli --debug add-package-scm "${PROJECT}" \
              --name "${COPR_PACKAGE}" \
              --clone-url "${SCM_CLONE_URL}" \
              --commit "${SCM_COMMIT}" \
              --spec "${SCM_SPEC}"
          fi

      - name: Re-inspect COPR package
        run: |
          PROJECT="${COPR_OWNER}/${COPR_PROJECT}"
          copr-cli --debug get-package "${PROJECT}" "${COPR_PACKAGE}"

      - name: Submit build to COPR
        run: |
          SRPM=$(ls rpmbuild/SRPMS/*.src.rpm | head -1)
          COPR_TARGET="${COPR_OWNER}/${COPR_PROJECT}"
          echo "Submitting ${SRPM} to COPR project ${COPR_TARGET}"
          CHROOT_ARGS=""
          for chroot in ${COPR_CHROOTS}; do
            CHROOT_ARGS="${CHROOT_ARGS} --chroot ${chroot}"
          done
          echo "Target chroots:${CHROOT_ARGS}"
          # shellcheck disable=SC2086
          copr-cli --debug build "${COPR_TARGET}" "${SRPM}" --nowait ${CHROOT_ARGS}

      - name: Build summary
        if: always()
        run: |
          VER="${{ steps.version.outputs.version }}"
          echo "::notice::COPR build submitted for loofi-fedora-tweaks v${VER}"
          echo "::notice::Target chroots: ${COPR_CHROOTS}"
          echo ""
          echo "Track build status at:"
          echo "  https://copr.fedorainfracloud.org/coprs/${COPR_OWNER}/${COPR_PROJECT}/builds/"
